services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rate_tracker
      POSTGRES_USER: rate_tracker
      POSTGRES_PASSWORD: rate_tracker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rate_tracker -d rate_tracker"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-}
      DATABASE_URL: ${DATABASE_URL:-}
      REDIS_URL: ${REDIS_URL:-}
      INGEST_BEARER_TOKEN: ${INGEST_BEARER_TOKEN:-}
    command: /app/scripts/api-start.sh
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./forbes_docs:/data:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 20

  worker:
    build: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-}
      DATABASE_URL: ${DATABASE_URL:-}
      REDIS_URL: ${REDIS_URL:-}
      INGEST_BEARER_TOKEN: ${INGEST_BEARER_TOKEN:-}
    command: celery -A config worker --loglevel=INFO
    volumes:
      - ./backend:/app
      - ./forbes_docs:/data:ro
    depends_on:
      api:
        condition: service_healthy

  beat:
    build: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-}
      DATABASE_URL: ${DATABASE_URL:-}
      REDIS_URL: ${REDIS_URL:-}
      INGEST_BEARER_TOKEN: ${INGEST_BEARER_TOKEN:-}
    command: celery -A config beat --loglevel=INFO
    volumes:
      - ./backend:/app
      - ./forbes_docs:/data:ro
    depends_on:
      api:
        condition: service_healthy

  web:
    build: ./web
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    command: npm run dev
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
